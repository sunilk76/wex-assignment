spring.application.name=purchase-transaction

# H2 in-memory database — no external database required
spring.datasource.url=jdbc:h2:mem:transactiondb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 console (development): http://localhost:8080/h2-console  JDBC URL: jdbc:h2:mem:transactiondb
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Treasury Reporting Rates of Exchange API
treasury.api.base-url=https://api.fiscaldata.treasury.gov
